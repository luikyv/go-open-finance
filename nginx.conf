worker_processes 1;

events {
  worker_connections 1024;
}

http {
    server {
        listen 443 ssl;
        server_name gopf.localhost;

        ssl_certificate /etc/nginx/ssl/server_cert.pem;
        ssl_certificate_key /etc/nginx/ssl/server_key.pem;

        location /auth {
            # Make sure the client certificate is not sent to the non mTLS endpoints.
            proxy_set_header X-Client-Cert "";

            proxy_pass http://host.docker.internal;
        }
    }

    server {
        listen 443 ssl;
        server_name matls-gopf.localhost;

        ssl_certificate /etc/nginx/ssl/server_cert.pem;
        ssl_certificate_key /etc/nginx/ssl/server_key.pem;
        
        ssl_client_certificate /etc/nginx/ssl/client_one_cert.pem;
        ssl_verify_client on;

        location / {
            if ($ssl_client_verify != "SUCCESS") {
                return 403;
            }

            proxy_set_header X-Client-Cert $ssl_client_escaped_cert;

            proxy_pass http://host.docker.internal;
        }
    }
}




